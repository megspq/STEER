<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OA Piano Tiles</title>
  <link rel="stylesheet" href="pianocss1.css">
  <script src="https://unpkg.com/tone"></script>
</head>
<body>

<!-- ================= HOME SCREEN ================= -->
<div id="homeScreen">
  <h1>Welcome to Majestics</h1>
  <p>Test your finger coordination</p>
  <button id="btnStart">Start</button>
</div>

<!-- ================= DIFFICULTY SELECTION ================= -->
<div id="difficultyScreen" style="display:none;">
  <h1>Select Difficulty</h1>
  <p>Choose how challenging you want it to be</p>
  <button id="btnEasy" onclick="selectDifficulty('easy')">Easy</button>
  <button id="btnMedium" onclick="selectDifficulty('medium')">Medium</button>
  <button id="btnHard" onclick="selectDifficulty('hard')">Hard</button>
  <button id="btnBackDiff">Back</button>
</div>

<!-- ================= GAME SCREEN ================= -->
<div id="gameScreen" style="display:none;">
  <h1>Majestics</h1>
  <div id="game">
    <div class="lane pinkLane"></div>
    <div class="lane blueLane"></div>
    <div class="lane purpleLane"></div>
    <div class="lane greyLane"></div>
    <div class="lane greenLane"></div>
  </div>

  <div id="hirono">
    <img id="hironoImg" src="hirono.png" alt="Hirono">
    <div class="speech-bubble" id="speechBubble">
      <span id="speechText"></span>
    </div>
  </div>

  <div id="message">Press A S D F G</div>

  <button id="startGame">Start game</button>
  <button id="backHome">Back to menu</button>

  <div id="score">Score: <span id="scoreValue">0</span></div>
  <div id="missCounter">Misses: <span id="missValue">0</span>/5</div>

  <div id="gameOverScreen">
    <h1>Game Over</h1>
    <button onclick="location.reload()">Restart</button>
  </div>
</div>

<script src="pianojs1.js"></script>
</body>
</html>
