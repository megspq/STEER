board = seeed-xiao-esp32-s3-plus
framework = arduino
extra_scripts = pre:scripts/patch_freertos_stats.py
lib_deps =
	olikraus/U8g2@^2.36.5
	tzapu/WiFiManager@^2.0.17
	bblanchon/ArduinoJson@^6.21.5
